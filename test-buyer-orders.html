<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Buyer Orders API</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: 50px auto;
        }

        pre {
            background: #f0f0f0;
            padding: 10px;
            overflow-x: auto;
        }

        button {
            padding: 10px 20px;
            margin: 10px 0;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }
    </style>
</head>

<body>
    <h1>Test Buyer Orders API</h1>

    <div>
        <button onclick="testApi()">Test Buyer Orders API</button>
    </div>

    <h2>Response:</h2>
    <pre id="response">Click button to test...</pre>

    <script>
        async function testApi() {
            const responseDiv = document.getElementById('response');
            responseDiv.innerHTML = 'Testing...';

            try {
                // Get a test token from localStorage if available
                const token = localStorage.getItem('auth_token');

                if (!token) {
                    responseDiv.innerHTML = '<span class="error">❌ No auth token found in localStorage. Please log in first.</span>';
                    return;
                }

                const response = await fetch('http://localhost/PHP_BACKEND/buyer/orders.php', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    responseDiv.innerHTML = '<span class="success">✅ API Response:</span><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                } else {
                    responseDiv.innerHTML = '<span class="error">❌ API Error (Status: ' + response.status + '):</span><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                }
            } catch (error) {
                responseDiv.innerHTML = '<span class="error">❌ Error: ' + error.message + '</span><pre>' + error.stack + '</pre>';
            }
        }
    </script>
</body>

</html>
