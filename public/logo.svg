<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Green background -->
  <rect width="200" height="200" rx="40" fill="#52C77A"/>
  
  <!-- White leaf -->
  <g transform="translate(100, 100)">
    <!-- Leaf outline -->
    <path d="M 0 -50 Q 30 -30 35 0 Q 30 30 0 50 Q -30 30 -35 0 Q -30 -30 0 -50 Z" 
          fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Leaf vein -->
    <line x1="0" y1="-50" x2="0" y2="50" stroke="white" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>